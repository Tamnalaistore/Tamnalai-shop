<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAMNALAI STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f0f12;
color:white;
margin:0;
}

header{
background:#14141a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:600;
font-size:18px;
color:#d04bff;
}

.banner{
margin:15px;
padding:25px;
border-radius:12px;
background:linear-gradient(45deg,#c03cff,#6b2cff);
}

.banner h2{
margin:0;
}

.container{
padding:15px;
}

.section{
margin-top:25px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:#1c1c24;
border-radius:10px;
padding:12px;
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#d04bff;
font-weight:600;
}

.product-page{
display:none;
padding:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:10px;
background:#1e1e26;
color:white;
}

.packages{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.package{
background:#1c1c24;
padding:12px;
border-radius:8px;
cursor:pointer;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(45deg,#ff2bd6,#7c3cff);
border:none;
border-radius:10px;
color:white;
font-weight:600;
font-size:16px;
}

</style>

</head>

<body>

<header>

<div class="logo">TAMNALAI STORE</div>

</header>


<div id="home">

<div class="banner">
<h2>Mobile Legends Top Up</h2>
<p>Fast • Safe • Instant Delivery</p>
</div>


<div class="container">

<div class="section">
<h3>MOST SELLING 🔥</h3>

<div class="products">

<div class="card" onclick="openProduct()">
<img src="https://i.imgur.com/Jn4xQ4C.png">
<p>Weekly Pass Combo</p>
</div>

<div class="card" onclick="openProduct()">
<img src="https://i.imgur.com/xN4bB9C.png">
<p>Mobile Legends Diamonds</p>
</div>

</div>

</div>

</div>

</div>



<div class="product-page" id="product">

<h3>Mobile Legends Top Up</h3>

<input id="userid" placeholder="User ID">

<input id="zoneid" placeholder="Zone ID">


<h4>Select Package</h4>

<div class="packages">

<div class="package" onclick="selectPack('Weekly Pass',152)">Weekly Pass ₹152</div>

<div class="package" onclick="selectPack('55 Diamonds',80)">55 Diamonds ₹80</div>

<div class="package" onclick="selectPack('110 Diamonds',156)">110 Diamonds ₹156</div>

<div class="package" onclick="selectPack('172 Diamonds',244)">172 Diamonds ₹244</div>

</div>


<button onclick="orderNow()">BUY NOW</button>

</div>


<script>

let product=""
let price=""

function openProduct(){

document.getElementById("home").style.display="none"
document.getElementById("product").style.display="block"

}

function selectPack(p,pr){

product=p
price=pr

alert("Selected "+p)

}

function orderNow(){

let uid=document.getElementById("userid").value
let zid=document.getElementById("zoneid").value

if(uid=="" || zid==""){

alert("Enter ID")

return

}

let msg="MLBB ORDER%0A%0AStore: TAMNALAI STORE%0AUser ID: "+uid+"%0AZone ID: "+zid+"%0APackage: "+product+"%0APrice: ₹"+price

window.open("https://wa.me/919862277104?text="+msg)

}

</script>

</body>
</html>
